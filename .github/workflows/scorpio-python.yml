name: scorpio-python

on:
  push:
    paths:
      - "python/scorpio/**"
      - ".github/workflows/scorpio-python.yml"
      - "docs/python-session.md"
  pull_request:
    paths:
      - "python/scorpio/**"
      - ".github/workflows/scorpio-python.yml"
      - "docs/python-session.md"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/scorpio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest
