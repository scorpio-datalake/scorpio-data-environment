name: scorpio-python

on:
  push:
    paths:
      - "python/**"
      - "examples/**"
      - "deploy/docker-compose/Dockerfile.python-runtime"
      - "docs/python-session.md"
      - "docs/python-dataframe.md"
      - "docs/license-notice-epic1-python.md"
      - "docs/license-notice-epic2-python.md"
      - "docs/deployment.md"
      - "license-and-notice.txt"
      - "LICENSE"
      - "NOTICE"
      - ".github/workflows/scorpio-python.yml"
  pull_request:
    paths:
      - "python/**"
      - "examples/**"
      - "deploy/docker-compose/Dockerfile.python-runtime"
      - "docs/python-session.md"
      - "docs/python-dataframe.md"
      - "docs/license-notice-epic1-python.md"
      - "docs/license-notice-epic2-python.md"
      - "docs/deployment.md"
      - "license-and-notice.txt"
      - "LICENSE"
      - "NOTICE"
      - ".github/workflows/scorpio-python.yml"
  workflow_dispatch:

concurrency:
  group: scorpio-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest-scorpio:
    name: pytest (scorpio) — Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/scorpio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev deps
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Byte-compile package (catch SyntaxError on all matrix Pythons)
        run: python -m compileall -q src/scorpio
      - name: Run pytest
        run: pytest

  pipeline-smoke:
    name: pip install — scorpio-pipeline — Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install scorpio then pipeline
        run: |
          python -m pip install -U pip
          pip install -e "./python/scorpio[dev]"
          pip install -e "./python/pipeline"
      - name: Verify imports
        run: |
          python -c "import scorpio; import scorpio_pipeline; print('scorpio', scorpio.__version__); print('scorpio-pipeline', scorpio_pipeline.__version__)"
