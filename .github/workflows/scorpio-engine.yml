name: Scorpio engine (Rust)

on:
  push:
    paths:
      - "engine/**"
      - ".github/workflows/scorpio-engine.yml"
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/scorpio-engine.yml"

defaults:
  run:
    working-directory: engine

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: S3 / MinIO integration (scorpio-core)
        run: |
          docker run -d --name scorpio-minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1; then
              echo "MinIO ready"
              break
            fi
            sleep 1
          done
          docker run --rm --network host quay.io/minio/mc \
            sh -c "mc --quiet alias set sc http://127.0.0.1:9000 minioadmin minioadmin && mc mb -p sc/scorpio-it"
          cargo test -p scorpio-core --features build-binary --test s3_minio_integration --locked -- --ignored --nocapture
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL_S3: http://127.0.0.1:9000
          AWS_ALLOW_HTTP: "true"
          AWS_EC2_METADATA_DISABLED: "true"

      - name: Stop MinIO
        if: always()
        run: docker rm -f scorpio-minio 2>/dev/null || true
