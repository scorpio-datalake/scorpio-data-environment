apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-runtime
  namespace: scorpio
  labels:
    app.kubernetes.io/name: scorpio-python-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scorpio-python-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scorpio-python-runtime
    spec:
      containers:
        - name: runtime
          image: scorpio-python-runtime:local
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
