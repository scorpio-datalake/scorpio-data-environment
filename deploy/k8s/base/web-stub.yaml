apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-stub
  namespace: scorpio
  labels:
    app.kubernetes.io/name: scorpio-web-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scorpio-web-stub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scorpio-web-stub
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: scorpio-web-stub
---
apiVersion: v1
kind: Service
metadata:
  name: web-stub
  namespace: scorpio
  labels:
    app.kubernetes.io/name: scorpio-web-stub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: scorpio-web-stub
  ports:
    - name: http
      port: 80
      targetPort: 80
