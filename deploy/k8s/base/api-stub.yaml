apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-stub
  namespace: scorpio
  labels:
    app.kubernetes.io/name: scorpio-api-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scorpio-api-stub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scorpio-api-stub
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:0.2.3
          imagePullPolicy: IfNotPresent
          args: ["-listen=:8080", "-text=scorpio-api-stub"]
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-stub
  namespace: scorpio
  labels:
    app.kubernetes.io/name: scorpio-api-stub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: scorpio-api-stub
  ports:
    - name: http
      port: 8080
      targetPort: 8080
