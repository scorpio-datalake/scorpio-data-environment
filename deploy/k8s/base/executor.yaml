apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  namespace: scorpio
  labels:
    app.kubernetes.io/name: scorpio-executor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scorpio-executor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scorpio-executor
    spec:
      containers:
        - name: executor
          image: scorpio-executor:local
          imagePullPolicy: IfNotPresent
          args:
            - --scheduler-host=scheduler
            - --scheduler-port=50050
            - --bind-host=0.0.0.0
            - --external-host=executor
          ports:
            - name: flight
              containerPort: 50051
            - name: shuffle
              containerPort: 50052
---
apiVersion: v1
kind: Service
metadata:
  name: executor
  namespace: scorpio
  labels:
    app.kubernetes.io/name: scorpio-executor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: scorpio-executor
  ports:
    - name: flight
      port: 50051
      targetPort: 50051
    - name: shuffle
      port: 50052
      targetPort: 50052
